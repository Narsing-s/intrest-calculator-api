<!DOCTYPE html>
<html>

<head>
<title>Interest Calculator</title>
</head>

<body>

<h2>Interest Calculator</h2>

<select id="type">
<option value="simple-interest">Simple Interest</option>
<option value="compound-interest">Compound Interest</option>
</select>

<br><br>

<input id="principal" placeholder="Principal"><br><br>
<input id="rate" placeholder="Rate"><br><br>
<input id="time" placeholder="Time"><br><br>
<input id="frequency" placeholder="Frequency (compound only)"><br><br>

<button onclick="calculate()">Calculate</button>

<pre id="result"></pre>

<script>

async function calculate(){

let type=document.getElementById("type").value;

let data={
principal:Number(document.getElementById("principal").value),
rate:Number(document.getElementById("rate").value),
time:Number(document.getElementById("time").value),
frequency:Number(document.getElementById("frequency").value)
}

let response=await fetch("/"+type,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

let result=await response.json()

document.getElementById("result").innerText=JSON.stringify(result,null,2)

}

</script>

</body>

</html>
