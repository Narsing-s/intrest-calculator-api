<!DOCTYPE html>
<html>
<head>
<title>Interest Calculator</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin-top:50px;
}

.container{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input,select,button{
width:90%;
padding:10px;
margin:10px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Interest Calculator</h2>

<select id="type">
<option value="simple-interest">Simple Interest</option>
<option value="compound-interest">Compound Interest</option>
</select>

<input type="number" id="principal" placeholder="Principal">

<input type="number" id="rate" placeholder="Rate">

<input type="number" id="time" placeholder="Time">

<input type="number" id="frequency" placeholder="Frequency (for compound)">

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

</div>

<script>

async function calculate(){

let type=document.getElementById("type").value;

let principal=document.getElementById("principal").value;
let rate=document.getElementById("rate").value;
let time=document.getElementById("time").value;
let frequency=document.getElementById("frequency").value;

let data={
principal:Number(principal),
rate:Number(rate),
time:Number(time),
frequency:Number(frequency)
}

let response=await fetch("http://localhost:8081/api/"+type,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

let result=await response.json()

document.getElementById("result").innerHTML=
JSON.stringify(result,null,2)

}

</script>

</body>
</html>
